---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fraud-service
  template:
    metadata:
      labels:
        app: fraud-service
    spec:
      containers:
      - name: fraud-service
        image: 405834051687.dkr.ecr.us-east-1.amazonaws.com/fraudservice:4
        imagePullPolicy: Always
        ports:
        - containerPort: 9593
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "kubernetes"
        - name: SERVER_PORT
          value: "9593"
        - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
          value: "http://dashboard-eureka-server:8761/eureka/"
        - name: SPRING_CLOUD_CONFIG_URI
          value: "http://config-server-local:8888"
        - name: SPRING_CLOUD_CONFIG_FAIL_FAST
          value: "false"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: microservices-secrets
              key: postgres-password
        livenessProbe:
          tcpSocket:
            port: 9593
          initialDelaySeconds: 45
          periodSeconds: 15
        readinessProbe:
          tcpSocket:
            port: 9593
          initialDelaySeconds: 20
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-service
spec:
  type: ClusterIP
  selector:
    app: fraud-service
  ports:
  - name: http
    port: 9593
    targetPort: 9593
