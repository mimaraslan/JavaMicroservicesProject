---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: 405834051687.dkr.ecr.us-east-1.amazonaws.com/notificationservice:1
        ports:
        - containerPort: 9594
        env:
        - name: SERVER_PORT
          value: "9594"
        - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
          value: "http://dashboard-eureka-server:8761/eureka/"
        - name: SPRING_CLOUD_CONFIG_URI
          value: "http://config-server-local:8888"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  type: ClusterIP
  selector:
    app: notification-service
  ports:
  - name: http
    port: 9594
    targetPort: 9594
