---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ledger-service
  template:
    metadata:
      labels:
        app: ledger-service
    spec:
      containers:
      - name: ledger-service
        image: 405834051687.dkr.ecr.us-east-1.amazonaws.com/ledgerservice:2
        ports:
        - containerPort: 9592
        env:
        - name: SERVER_PORT
          value: "9592"
        - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
          value: "http://dashboard-eureka-server:8761/eureka/"
        - name: SPRING_CLOUD_CONFIG_URI
          value: "http://config-server-local:8888"
---
apiVersion: v1
kind: Service
metadata:
  name: ledger-service
spec:
  type: ClusterIP
  selector:
    app: ledger-service
  ports:
  - name: http
    port: 9592
    targetPort: 9592
