---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ledger-service
  template:
    metadata:
      labels:
        app: ledger-service
    spec:
      containers:
      - name: ledger-service
        image: 405834051687.dkr.ecr.us-east-1.amazonaws.com/ledgerservice:7
        imagePullPolicy: Always
        ports:
        - containerPort: 9592
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "kubernetes"
        - name: SERVER_PORT
          value: "9592"
        - name: EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE
          value: "http://dashboard-eureka-server:8761/eureka/"
        - name: SPRING_CLOUD_CONFIG_URI
          value: "http://config-server-local:8888"
        - name: SPRING_CLOUD_CONFIG_FAIL_FAST
          value: "false"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres:5432/Micro_LedgerServiceDB"
        - name: SPRING_DATASOURCE_USERNAME
          value: "postgres"
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: microservices-secrets
              key: postgres-password
        - name: SPRING_DATA_REDIS_HOST
          value: "redis"
        - name: SPRING_DATA_REDIS_PORT
          value: "6379"
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          value: "redpanda:9092"
        - name: MANAGEMENT_HEALTH_KAFKA_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_REDIS_ENABLED
          value: "false"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: microservices-secrets
              key: postgres-password
        livenessProbe:
          tcpSocket:
            port: 9592
          initialDelaySeconds: 45
          periodSeconds: 15
        readinessProbe:
          tcpSocket:
            port: 9592
          initialDelaySeconds: 20
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ledger-service
spec:
  type: ClusterIP
  selector:
    app: ledger-service
  ports:
  - name: http
    port: 9592
    targetPort: 9592
