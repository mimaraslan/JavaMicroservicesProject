---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-eureka-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-eureka-server
  template:
    metadata:
      labels:
        app: dashboard-eureka-server
    spec:
      containers:
      - name: dashboard-eureka-server
        image: 242201296943.dkr.ecr.us-east-1.amazonaws.com/dashboardeurekaserver:1
        ports:
        - containerPort: 8761
        env:
        - name: SERVER_PORT
          value: "8761"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-eureka-server
spec:
  type: ClusterIP
  selector:
    app: dashboard-eureka-server
  ports:
  - name: http
    port: 8761
    targetPort: 8761
