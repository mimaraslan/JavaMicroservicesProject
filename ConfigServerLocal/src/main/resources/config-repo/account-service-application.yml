server:
  port: 9591

spring:

  zipkin:
    enabled: true
    base-url: http://localhost:9411/
    service:
      name: account-service
    sender:
      type: web

  sleuth:
    sampler:
      probability: 1.0

  datasource:
    url: jdbc:postgresql://localhost:9999/Micro_AccountServiceDB
    username: postgres
    password: 123456789
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update  
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10 dakika (milisaniye)

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

springdoc:
  swagger-ui:
    path: /swagger-ui.html

keycloak:
  server-url: http://localhost:8180
  realm: master
  admin-username: admin
  admin-password: admin
  token-url: http://localhost:8180/realms/master/protocol/openid-connect/token
  client-id: account-service
  client-secret: CLIENT_SECRET 