server:
  port: 80

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://127.0.0.1:9411/api/v2/spans

spring:

  data:
    redis:
      host: redis
      port: 6379

  cloud:
    # Tüm servislerin kaydolduğu Eureka sunucu adresini belirtir
    gateway:
      # Eureka'dan servisleri otomatik olarak bulup yönlendirme yapabilmek için
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      default-filters:
        # Tüm rotalara uygulanacak, IP bazlı temel Hız Sınırlama
        - name: RequestRateLimiter
          args:
            key-resolver: '#{@ipAddressResolver}' # Custom IP Resolver Bean'i gerektirir
            redis-rate-limiter.replenishRate: 100 # Saniyede 100 istek
            redis-rate-limiter.burstCapacity: 200 # Anlık 200 istek


      routes:
        - id: account-service
#          uri: http://localhost:9591
          uri: lb://account-service-application
          predicates:
            - Path=/account/**
          filters:
            # Path'i olduğu gibi bırak, çünkü AccountService /account/** path'ini bekliyor
            - name: CircuitBreaker
              args:
                name: account
                fallbackUri: forward:/fallback/account

        - id: ledger-service
          #          uri: http://localhost:9592
          uri: lb://ledger-service-application
          predicates:
            - Path=/ledger/**
          filters:
            - name: CircuitBreaker
              args:
                name: ledger
                fallbackUri: forward:/fallback/ledger

        - id: fraud-service
#          uri: http://localhost:9593
          uri: lb://fraud-service-application
          predicates:
            - Path=/fraud/**
          filters:
            - name: CircuitBreaker
              args:
                name: fraud
                fallbackUri: forward:/fallback/fraud


        - id: notification-service
          #          uri: http://localhost:9594
          uri: lb://notification-service-application
          predicates:
            - Path=/notification/**
          filters:
            - name: CircuitBreaker
              args:
                name: notification
                fallbackUri: forward:/fallback/notification

api-gateway-service:
  secret:
    key: q8WJt7uQn3j0N4kJb0V1bU4rZk7y9cYp2GfH1YtJmHs=
  issuer: İstanbul34
  expire:
    date: 300000

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    urls:
      - name: account-service
        url: /v3/api-docs/account-service
      - name: ledger-service
        url: /v3/api-docs/ledger-service
      - name: fraud-service
        url: /v3/api-docs/fraud-service
      - name: notification-service
        url: /v3/api-docs/notification-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/master
          jwk-set-uri: http://keycloak:8080/realms/master/protocol/openid-connect/certs
